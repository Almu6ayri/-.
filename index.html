<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy English Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background: radial-gradient(circle at center, #1b0033 0%, #000000 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Hide overflow for stars */
            position: relative;
        }

        /* Galaxy Stars Background */
        #stars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.8);
            animation: twinkle linear infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Quiz Container */
        .quiz-container {
            background: rgba(20, 10, 40, 0.65);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.5), inset 0 0 20px rgba(138, 43, 226, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            text-align: center;
            z-index: 1;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .quiz-container::-webkit-scrollbar {
            width: 8px;
        }
        .quiz-container::-webkit-scrollbar-thumb {
            background: rgba(138, 43, 226, 0.5);
            border-radius: 10px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #8a2be2;
        }

        .progress {
            font-size: 14px;
            color: #bfa1e3;
            margin-bottom: 25px;
            font-weight: 300;
        }

        .question {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(138, 43, 226, 0.5);
            color: white;
            padding: 15px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .btn:hover:not([disabled]) {
            background: rgba(138, 43, 226, 0.3);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.6);
            transform: translateY(-2px);
        }

        .btn.correct {
            background: rgba(40, 167, 69, 0.8) !important;
            border-color: #28a745 !important;
            box-shadow: 0 0 15px rgba(40, 167, 69, 0.6);
        }

        .btn.wrong {
            background: rgba(220, 53, 69, 0.8) !important;
            border-color: #dc3545 !important;
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.6);
        }

        .next-btn {
            background: linear-gradient(45deg, #8a2be2, #4b0082);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 30px;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.5);
            display: none;
            width: 100%;
        }

        .next-btn:hover {
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.8);
            transform: scale(1.05);
        }

        .hidden {
            display: none !important;
        }

        .score-section {
            text-align: center;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #8a2be2;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
            font-size: 32px;
            font-weight: bold;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.6), inset 0 0 20px rgba(138, 43, 226, 0.3);
            text-shadow: 0 0 10px #fff;
        }

        .restart-btn {
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
            transition: 0.3s;
        }
        
        .restart-btn:hover {
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.8);
            transform: scale(1.05);
        }

    </style>
</head>
<body>

    <div id="stars-container"></div>

    <div class="quiz-container">
        <h1>Galaxy English Quiz</h1>
        
        <div id="quiz-section">
            <div class="progress" id="progress">Question 1 of X</div>
            <div class="question" id="question">Question text here?</div>
            <div class="options" id="options">
                <!-- Buttons injected here -->
            </div>
            <button class="next-btn" id="next-btn">Next Question</button>
        </div>

        <div id="score-section" class="score-section hidden">
            <h2>Quiz Completed!</h2>
            <p style="margin: 10px 0 20px 0; color: #ccc;">Here is your result out of the vast universe:</p>
            <div class="score-circle" id="score-circle">
                0 / 0
            </div>
            <button class="restart-btn" id="restart-btn">Try Again</button>
        </div>
    </div>

    <script>
        // Generate Stars
        function generateStars() {
            const container = document.getElementById('stars-container');
            const starCount = 150;
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const size = Math.random() * 3 + 1; // 1px to 4px
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                star.style.animationDelay = (Math.random() * 2) + 's';
                container.appendChild(star);
            }
        }
        generateStars();

        // Quiz Data generated from Python
        const questions = [{"question": "Choose the correct sentence :", "options": ["an old beautiful house", "a beautiful old house", "a house old beautiful"], "answer": 1}, {"question": "I’m ……… young to drive a car.", "options": ["enough", "too", "very"], "answer": 1}, {"question": "He is tall……..", "options": ["enough", "too", "very"], "answer": 0}, {"question": "Potential means:", "options": ["Money", "Center", "Capacity for growth"], "answer": 2}, {"question": "Cool! means:", "options": ["Cold", "Bad", "Great"], "answer": 2}, {"question": "Hold on! means:", "options": ["Hurry", "Stop for a moment", "Go"], "answer": 1}, {"question": "A grand is:", "options": ["One hundred", "Five hundred", "One thousand"], "answer": 2}, {"question": "Would you mind _______ me with my homework?", "options": ["help", "helping", "helped"], "answer": 1}, {"question": "Would you mind _______ the TV for a while?", "options": ["turn off", "turning off", "turned off"], "answer": 1}, {"question": "______ is good for your health.", "options": ["Swim", "Swimming", "Swims"], "answer": 1}, {"question": "______ before exercise can cause injuries.", "options": ["Not warming up", "Warm up", "Warming"], "answer": 0}, {"question": "______ sports is fun for many people.", "options": ["Watch", "Watching", "Watched"], "answer": 1}, {"question": "This is the best movie I ______ ever seen.", "options": ["have", "has", "am"], "answer": 0}, {"question": "Who is the greatest athlete you’ve ever ______?", "options": ["see", "saw", "seen"], "answer": 2}, {"question": "Guts means…", "options": ["fear", "courage", "sadness"], "answer": 1}, {"question": "What does \"up for\" mean?", "options": ["afraid of", "ready for", "tired of"], "answer": 1}, {"question": "Astounding means…", "options": ["boring", "amazing", "dangerous"], "answer": 1}, {"question": "A spectator is someone who…", "options": ["plays the sport", "watches the sport", "teaches skiing"], "answer": 1}, {"question": "I _______ finished my homework.", "options": ["have", "has", "am"], "answer": 0}, {"question": "She has been _______ TV for 2 hours.", "options": ["watch", "watching", "watched"], "answer": 1}, {"question": "We have lived here _______ 2018.", "options": ["for", "since", "ago"], "answer": 1}, {"question": "He has been studying _______ 3 hours.", "options": ["since", "for", "from"], "answer": 1}, {"question": "Ali is ______ than Omar.", "options": ["tall", "taller", "tallest"], "answer": 1}, {"question": "Today is ______ than yesterday.", "options": ["hot", "hotter", "hottest"], "answer": 1}, {"question": "This book is ______ than that book.", "options": ["expensive", "expensiver", "more expensive"], "answer": 2}, {"question": "He is ______ strong ______ his father.", "options": ["as / as", "stronger / than", "more / more"], "answer": 0}, {"question": "“getting to” means:", "options": ["Really impress me", "Annoying or bothering", "Feeling happy"], "answer": 1}, {"question": "“killer” mean in slang?", "options": ["Sad", "Annoying", "Great, amazing"], "answer": 2}, {"question": "The movie was very ………. I fell asleep.", "options": ["bored", "boring", "bore"], "answer": 1}, {"question": "She is ……. because she didn’t pass the exam.", "options": ["disappointing", "disappointed", "disappoint"], "answer": 1}, {"question": "He ……… Ahmed at the airport.", "options": ["ran into", "ran him", "ran him into"], "answer": 0}, {"question": "What does \"spread\" mean?", "options": ["A small snack", "A big meal", "A drink"], "answer": 1}, {"question": "In no time\" means:", "options": ["Never", "Slowly", "Very quickly"], "answer": 2}, {"question": "I have _____ apples in my bag.", "options": ["much", "many", "any"], "answer": 1}, {"question": "There isn’t _____ milk in the fridge.", "options": ["many", "much", "some"], "answer": 1}, {"question": "How _____ water do you drink every day?", "options": ["much", "many", "some"], "answer": 0}, {"question": "There are _____ books on the table.", "options": ["much", "any", "many"], "answer": 2}, {"question": "We don’t have _____ money.", "options": ["some", "many", "any"], "answer": 2}, {"question": "What does “duration” mean?", "options": ["speed", "length of time", "temperature"], "answer": 1}, {"question": "What does “pampered” mean?", "options": ["ignored", "punished", "indulged"], "answer": 2}, {"question": "You phone may be …..", "options": ["Stole", "Stolen", "Steel"], "answer": 1}, {"question": "Parrots can be ….. to talk.", "options": ["trained", "train", "training"], "answer": 0}, {"question": "Hang in there!” means:", "options": ["Give up", "Don’t give up", "Go quickly"], "answer": 1}, {"question": "get to the point” means:", "options": ["Talk a lot", "Change the topic", "Be direct"], "answer": 2}, {"question": "compassion means:", "options": ["hate", "fear", "sympathy"], "answer": 2}, {"question": "………cheetahs and leopards are fast.", "options": ["Neither", "Both", "None"], "answer": 1}, {"question": "I will eat ……. an apple or a banana.", "options": ["neither", "both", "either"], "answer": 2}, {"question": "…….of the five students passed the difficult exam.", "options": ["Neither", "None", "Both"], "answer": 1}, {"question": "If I ……. you, I would apologize.", "options": ["am", "were", "had been"], "answer": 1}, {"question": "If she knew the answer, she ………. us.", "options": ["helps", "helped", "would help"], "answer": 2}, {"question": "If she had studied, she …… the test.", "options": ["passed", "would pass", "would have passed"], "answer": 2}, {"question": "If you …… me earlier, I would have helped you.", "options": ["call", "called", "had called"], "answer": 2}, {"question": "She is used to …….. early every day.", "options": ["wake", "woke", "waking"], "answer": 2}, {"question": "By 2030, I …….. graduated from university.", "options": ["will", "will be", "will have"], "answer": 2}, {"question": "At 8 PM tomorrow, we …….. studying.", "options": ["will", "will be", "will have"], "answer": 1}, {"question": "I ……. drink milk, but now I don’t.", "options": ["used to", "use to", "use"], "answer": 0}, {"question": "They are used to ……. in hot weather.", "options": ["living", "lived", "live"], "answer": 0}];

        let currentQuestionIndex = 0;
        let score = 0;

        const questionEl = document.getElementById("question");
        const optionsEl = document.getElementById("options");
        const nextBtn = document.getElementById("next-btn");
        const progressEl = document.getElementById("progress");
        const quizSection = document.getElementById("quiz-section");
        const scoreSection = document.getElementById("score-section");
        const scoreCircle = document.getElementById("score-circle");
        const restartBtn = document.getElementById("restart-btn");

        function startQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            quizSection.classList.remove("hidden");
            scoreSection.classList.add("hidden");
            showQuestion();
        }

        function showQuestion() {
            resetState();
            let currentQuestion = questions[currentQuestionIndex];
            questionEl.innerText = (currentQuestionIndex + 1) + ". " + currentQuestion.question;
            progressEl.innerText = `Question ${currentQuestionIndex + 1} of ${questions.length}`;

            currentQuestion.options.forEach((option, index) => {
                const button = document.createElement("button");
                button.innerText = option;
                button.classList.add("btn");
                button.dataset.index = index;
                button.addEventListener("click", selectAnswer);
                optionsEl.appendChild(button);
            });
        }

        function resetState() {
            nextBtn.style.display = "none";
            while(optionsEl.firstChild) {
                optionsEl.removeChild(optionsEl.firstChild);
            }
        }

        function selectAnswer(e) {
            const selectedBtn = e.target;
            const selectedIndex = parseInt(selectedBtn.dataset.index);
            const correctIndex = questions[currentQuestionIndex].answer;

            if (selectedIndex === correctIndex) {
                selectedBtn.classList.add("correct");
                score++;
            } else {
                selectedBtn.classList.add("wrong");
                // Auto highlight the correct answer
                Array.from(optionsEl.children).forEach(button => {
                    if (parseInt(button.dataset.index) === correctIndex) {
                        button.classList.add("correct");
                    }
                });
            }

            // Disable all buttons after selecting
            Array.from(optionsEl.children).forEach(button => {
                button.disabled = true;
                button.style.cursor = 'not-allowed';
            });

            nextBtn.style.display = "block";
        }

        nextBtn.addEventListener("click", () => {
            currentQuestionIndex++;
            if(currentQuestionIndex < questions.length) {
                showQuestion();
            } else {
                showScore();
            }
        });

        function showScore() {
            quizSection.classList.add("hidden");
            scoreSection.classList.remove("hidden");
            scoreCircle.innerText = `${score} / ${questions.length}`;
        }

        restartBtn.addEventListener("click", startQuiz);

        // Init
        startQuiz();
    </script>
</body>
</html>
